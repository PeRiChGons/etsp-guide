  <title>Redirigiendo · Eternal Sword Pact Guía</title>

<body>
  <p>Redirigiendo a Eternal Sword Pact Guía…</p>
  <script>
    // Conserva el destino solicitado como ruta hash y vuelve a la aplicación principal.
    (function () {
      var base = '/etsp-guide/';
      var path = window.location.pathname.replace(base, '').replace(/^\/+|\/+$/g, '');
      var route = path ? '#/' + path : '#/inicio';
      window.location.replace(base + route);
    }());
  </script>
</body>
