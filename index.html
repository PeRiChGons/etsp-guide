  <header class="site-header">
    <button class="menu-toggle" id="menu-toggle" type="button" aria-controls="menu-lateral" aria-expanded="false">
      <span aria-hidden="true">☰</span><span>Abrir menú</span>
    </button>
    <a class="brand" href="#/inicio" aria-label="Ir al inicio">
      <span class="brand-mark" aria-hidden="true">✦</span>
      <span>Eternal Sword Pact <strong>Guía</strong></span>
    </a>
    <label class="language-control" for="language-selector">
      <span aria-hidden="true">🌐</span>
      <span class="sr-only">Traducir la página</span>
      <select id="language-selector" aria-label="Traducir la página">
        <option value="">Idioma</option>
        <option value="en">English</option>
        <option value="fr">Français</option>
        <option value="de">Deutsch</option>
        <option value="pt">Português</option>
        <option value="it">Italiano</option>
        <option value="ca">Català</option>
        <option value="ja">日本語</option>
        <option value="ko">한국어</option>
        <option value="zh-CN">中文</option>
        <option value="ru">Русский</option>
        <option value="ar">العربية</option>
        <option value="hi">हिन्दी</option>
        <option value="more">Más idiomas…</option>
      </select>
    </label>
    <span class="status-badge">En desarrollo</span>
  </header>

  <div class="app-shell">
    <aside class="sidebar" id="menu-lateral" aria-label="Navegación principal">

  <noscript>Esta guía necesita JavaScript para mostrar sus secciones.</noscript>
  <script src="assets/js/content.js?v=20260717-3"></script>
  <script src="assets/js/client-item-text.js?v=20260717-1"></script>
  <script src="assets/js/reference-data.js?v=20260717-3"></script>
  <script src="assets/js/pages.js?v=20260717-3"></script>
  <script src="assets/js/router.js?v=20260717-3"></script>
  <script src="assets/js/app.js?v=20260717-3"></script>
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>
  <script>
    // Abre la sección actual en el traductor web de Google sin usar iframes.
    document.getElementById('language-selector').addEventListener('change', function () {
      var language = this.value;
      if (!language) { return; }
      var target = language === 'more' ? 'en' : language;
      var localPreview = window.location.hostname === '127.0.0.1' || window.location.hostname === 'localhost';
      var publicPage = 'https://perichgons.github.io/etsp-guide/' + window.location.hash;
      var currentPage = localPreview ? publicPage : window.location.href;
      var translateUrl = 'https://translate.google.com/translate?sl=es&tl=' + encodeURIComponent(target) + '&u=' + encodeURIComponent(currentPage);
      window.open(translateUrl, '_blank', 'noopener,noreferrer');
      this.value = '';
    });
  </script>
</body>
</html>
