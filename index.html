<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#070b18">
    <meta name="description" content="Eternal Sword Pact Guía: catálogo de objetos, sistemas, mapas, dungeons y relaciones del juego.">
    <title>Eternal Sword Pact Guía</title>
    <link rel="stylesheet" href="assets/css/site.css">
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <button id="menu-toggle" class="icon-button" type="button" aria-label="Abrir menú" aria-expanded="false">☰</button>
        <a class="brand" href="#/inicio" aria-label="Eternal Sword Pact Guía">
          <span class="brand-mark">✦</span>
          <span>Eternal Sword Pact <em>Guía</em></span>
        </a>
        <div class="topbar-actions">
          <label class="language-control" for="language-selector">🌐 <span data-i18n="language">Idioma</span>
            <select id="language-selector" aria-label="Idioma">
              <option value="es">Español</option>
              <option value="en">English</option>
              <option value="de">Deutsch</option>
              <option value="pl">Polski</option>
              <option value="google">Más idiomas</option>
            </select>
          </label>
          <a class="forum-link" href="https://github.com/PeRiChGons/etsp-guide/discussions" target="_blank" rel="noopener noreferrer" data-i18n="forum">Foro</a>
        </div>
      </header>

      <div class="workspace">
        <aside id="sidebar" class="sidebar" aria-label="Navegación principal">
          <div class="sidebar-heading" data-i18n="navigation">Navegación</div>
          <nav class="side-nav">
            <a href="#/inicio" data-route="inicio"><span>⌂</span><span data-i18n="home">Inicio</span></a>
            <a href="#/objetos" data-route="objetos"><span>◈</span><span data-i18n="objects">Buscador de objetos</span></a>
            <details open>
              <summary><span>◉</span><span data-i18n="game">Juego</span></summary>
              <a href="#/sistemas" data-route="sistemas"><span>◇</span><span data-i18n="systems">Sistemas del personaje</span></a>
              <a href="#/mapas" data-route="mapas"><span>⌘</span><span data-i18n="maps">Mapas y dungeons</span></a>
              <a href="#/mecanicas" data-route="mecanicas"><span>✧</span><span data-i18n="mechanics">Mecánicas</span></a>
            </details>
            <a href="#/clases" data-route="clases"><span>♜</span><span data-i18n="classes">Clases</span></a>
            <a href="#/relaciones" data-route="relaciones"><span>⛓</span><span data-i18n="relations">Relaciones</span></a>
          </nav>
          <div class="sidebar-note">
            <span class="pulse-dot"></span>
            <span data-i18n="clientData">Datos extraídos del cliente</span>
          </div>
        </aside>

        <button id="sidebar-backdrop" class="sidebar-backdrop" type="button" aria-label="Cerrar menú"></button>

        <main id="main-content" tabindex="-1">
          <div id="app-view" class="view-container"></div>
        </main>
      </div>

      <footer class="site-footer">
        <span>Eternal Sword Pact Guía</span><span>·</span><span>PeRiCh</span><span>·</span><span data-i18n="unofficial">Proyecto comunitario no oficial</span>
      </footer>
    </div>

    <dialog id="object-dialog" class="object-dialog">
      <button id="dialog-close" class="dialog-close" type="button" aria-label="Cerrar">×</button>
      <div id="dialog-content"></div>
    </dialog>

    <script type="module" src="assets/js/site.js"></script>
  </body>
</html>
